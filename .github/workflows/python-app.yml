name: Unit Tests

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install "poetry<3"

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Validate Poetry project metadata
        run: poetry check

      - name: Run unit tests
        run: poetry run pytest -q

      - name: Lint
        run: poetry run python -m ruff check .

  package:
    needs: test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install "poetry<3" twine

      - name: Build package (sdist + wheel)
        run: poetry build

      - name: Check package metadata and long description
        run: python -m twine check dist/*
