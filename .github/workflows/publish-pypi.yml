# Publishes to PyPI using trusted publishing (OIDC). Configure the project on PyPI:
# https://docs.pypi.org/trusted-publishers/adding-a-publisher/ (GitHub as publisher)
# Optional: add `environment: { name: pypi }` to the job and register that
# environment name on PyPI if you want deployment protection rules.

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: poetry

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install "poetry<3"

      - name: Build distributions
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
