name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_method:
        description: "Publish method"
        required: true
        default: "trusted"
        type: choice
        options:
          - trusted
          - poetry

permissions:
  id-token: write
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Validate Poetry configuration
        run: poetry check

      - name: Run tests
        run: poetry run pytest -q

      - name: Build distributions
        run: poetry build

      - name: Smoke test wheel install
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -c "import lazy_fred; print('import-ok')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/*

  publish_trusted:
    if: github.event_name != 'workflow_dispatch' || inputs.publish_method == 'trusted'
    needs: verify
    runs-on: ubuntu-latest
    env:
      # Opt-in to Node.js 24 for GitHub-hosted JavaScript actions.
      # This avoids Node.js 20 deprecation warnings and future breakage.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
          attestations: false
          skip_existing: true

  publish_poetry:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_method == 'poetry'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry

      - name: Publish with Poetry (token-based)
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
        run: poetry publish --build --skip-existing
